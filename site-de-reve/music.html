<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes musiques que j'adore</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Styles Horloge */
        #horloge {
            position: fixed;
            top: 10px;
            left: 10px;
            background-color: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 20px;
            font-weight: bold;
            z-index: 1000;
        }

        /* Styles Player Spotify */
        .spotify-player{
            background:#181818;
            width:300px;
            padding:15px;
            border-radius:12px;
            color:white;
            text-align:center;
            font-family:Arial;
        }

        .spotify-player .cover{
            width:100%;
            border-radius:50%;
            margin-bottom:10px;
            transition: transform 0.1s linear;
        }

        .spotify-player .rotating{
            animation:spin 5s linear infinite;
        }

        @keyframes spin{
            0% { transform: rotate(0deg);}
            100% { transform: rotate(360deg);}
        }

        .spotify-player .title{
            font-size:16px;
            margin-bottom:4px;
        }

        .spotify-player .artist{
            font-size:12px;
            color:#b3b3b3;
            margin-bottom:10px;
        }

        .spotify-player .progress-container{
            width:100%;
            height:6px;
            background:#404040;
            border-radius:5px;
            cursor:pointer;
            margin-top:8px;
            position:relative;
        }

        .spotify-player .progress{
            height:6px;
            background:#1db954;
            width:0%;
            border-radius:5px;
            box-shadow:0 0 8px #1db954;
            transition:width 0.2s;
        }

        .spotify-player .time{
            display:flex;
            justify-content:space-between;
            font-size:12px;
            color:#b3b3b3;
            margin-top:4px;
        }

        .spotify-player .controls{
            margin-top:12px;
            display:flex;
            justify-content:center;
            gap:10px;
        }

        .spotify-player .controls button{
            background:#1db954;
            border:none;
            color:white;
            width:35px;
            height:35px;
            border-radius:50%;
            cursor:pointer;
            font-size:14px;
        }
    </style>
</head>
<body>

    <!-- Horloge -->
    <div id="horloge">00:00:00</div>

    <header>
        <h1>Les musiques</h1>
        <nav>
            <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="voyage.html">Mes voyages de rêve</a></li>
                <li><a href="sneakers.html">Les Sneakers</a></li>
                <li><a href="music.html">Les musiques</a></li>
                <li><a href="site-scolaire/index.html">Retour au site scolaire</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <h2>ici vous retrouverez mes musiques du moment</h2>
    </section>

    <section class="content">
        <div class="spotify-player">
            <img id="sp-cover" class="cover" src="cover1.jpg">
            <div class="title" id="sp-title">Musique 1</div>
            <div class="artist" id="sp-artist">Artiste 1</div>

            <audio id="sp-audio"></audio>

            <div class="progress-container" onclick="spSetProgress(event)">
                <div class="progress" id="sp-progress"></div>
            </div>

            <div class="time">
                <span id="sp-current">0:00</span>
                <span id="sp-duration">0:00</span>
            </div>

            <div class="controls">
                <button onclick="spPrev()">⏮</button>
                <button onclick="spTogglePlay()" id="sp-play">▶</button>
                <button onclick="spNext()">⏭</button>
            </div>
        </div>
    </section>

    <script>
        // Horloge
        function mettreAJourHorloge() {
            var maintenant = new Date();
            var heures = ("0" + maintenant.getHours()).slice(-2);
            var minutes = ("0" + maintenant.getMinutes()).slice(-2);
            var secondes = ("0" + maintenant.getSeconds()).slice(-2);
            document.getElementById('horloge').textContent = heures + ":" + minutes + ":" + secondes;
        }
        setInterval(mettreAJourHorloge, 1000);
        mettreAJourHorloge();

        // Player Spotify
        let spSongs=[
            {name:"Una noche in Medelin",artist:"CRIS MJ",src:"music.mp3",cover:"cover.jpg"},
            {name:"Still DRE",artist:"DR DRE ft SNOOP DOGG",src:"music(1).mp3",cover:"cover(1).jpg"},
            {name:"Mon Bébé",artist:"RNBOI",src:"music(2).mp3",cover:"cover(2).jpg"},
            {name:"BMS by my side",artist:"RAMBO",src:"music(3).mp3",cover:"cover(3).jpg"},
            {name:"Wati by Night",artist:"SEXION D ASSAUT",src:"music(4).mp3",cover:"cover(4).jpg"},
            {name:"Ma direction",artist:"SEXION D ASSAUT",src:"music(5).mp3",cover:"cover(5).jpg"},
            {name:"Casanova",artist:"SOOLKING ft GAZO",src:"music(6).mp3",cover:"cover(6).jpg"},
            {name:"Piano",artist:"GIMS ft WERENOI",src:"music(7).mp3",cover:"cover(7).jpg"},
            {name:"Nuthin But A G Thang",artist:"DR DRE ft SNOOP DOGG",src:"music(8).mp3",cover:"cover(8).jpg"},
            {name:"The Real Slim Shady ",artist:"EMINEM",src:"music(9).mp3",cover:"cover(9).jpg"},	
            {name:"HOUDINI",artist:"EMINEM",src:"music(10).mp3",cover:"cover(10).jpg"},	
            		
        ];

        let spIndex=0;
        let spAudio=document.getElementById("sp-audio");
        let spTitle=document.getElementById("sp-title");
        let spArtist=document.getElementById("sp-artist");
        let spCover=document.getElementById("sp-cover");
        let spProgress=document.getElementById("sp-progress");
        let spPlayBtn=document.getElementById("sp-play");
        let spCurrent=document.getElementById("sp-current");
        let spDuration=document.getElementById("sp-duration");

        function spLoadSong(){
            spAudio.src=spSongs[spIndex].src;
            spTitle.innerText=spSongs[spIndex].name;
            spArtist.innerText=spSongs[spIndex].artist;
            spCover.src=spSongs[spIndex].cover;
            spCover.classList.remove("rotating");
        }
        spLoadSong();

        function spTogglePlay(){
            if(spAudio.paused){
                spAudio.play();
                spPlayBtn.innerHTML="⏸";
                spCover.classList.add("rotating");
            }else{
                spAudio.pause();
                spPlayBtn.innerHTML="▶";
                spCover.classList.remove("rotating");
            }
        }

        function spNext(){
            spIndex++;
            if(spIndex>=spSongs.length) spIndex=0;
            spLoadSong();
            spAudio.play();
            spPlayBtn.innerHTML="⏸";
            spCover.classList.add("rotating");
        }

        function spPrev(){
            spIndex--;
            if(spIndex<0) spIndex=spSongs.length-1;
            spLoadSong();
            spAudio.play();
            spPlayBtn.innerHTML="⏸";
            spCover.classList.add("rotating");
        }

        function formatTime(time){
            let minutes=Math.floor(time/60);
            let seconds=Math.floor(time%60);
            if(seconds<10) seconds="0"+seconds;
            return minutes+":"+seconds;
        }

        spAudio.addEventListener("loadedmetadata",()=>{
            spDuration.innerText=formatTime(spAudio.duration);
        });

        spAudio.addEventListener("timeupdate",()=>{
            let percent=(spAudio.currentTime/spAudio.duration)*100;
            spProgress.style.width=percent+"%";
            spCurrent.innerText=formatTime(spAudio.currentTime);
        });

        function spSetProgress(e){
            let width=e.currentTarget.clientWidth;
            let clickX=e.offsetX;
            spAudio.currentTime=(clickX/width)*spAudio.duration;
        }

        // Lecture automatique
        spAudio.addEventListener("ended", () => {
            spNext();
        });
    </script>
</body>
</html>
